<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-4998932108087321">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Tracking | CreatorLift</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 3rem 0;
        }

        .tracking-shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .tracking-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.5rem;
            margin-top: 2rem;
        }

        .tracking-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .tracking-thumb {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
        }

        .tracking-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .tracking-meta div,
        .update-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
        }

        .tracking-meta span {
            display: block;
            color: var(--text-secondary);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.35rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            background: rgba(139, 92, 246, 0.12);
            color: var(--text-primary);
            border: 1px solid rgba(139, 92, 246, 0.25);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .update-list {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
        }

        .back-link {
            color: var(--primary-glow);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 760px) {
            .tracking-grid {
                grid-template-columns: 1fr;
            }

            .tracking-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="tracking-shell">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to CreatorLift</a>
        <div class="tracking-card" id="trackingCard">
            <h1>Loading campaign...</h1>
            <p style="color: var(--text-secondary);">Please wait while we fetch your campaign status.</p>
        </div>
    </main>

    <script>
        const API_BASE = '';

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function statusLabel(status) {
            return String(status || '').replace(/_/g, ' ').replace(/\b\w/g, char => char.toUpperCase());
        }

        function getTrackingCode() {
            const query = new URLSearchParams(window.location.search);
            if (query.get('c')) return query.get('c');
            const parts = window.location.pathname.split('/').filter(Boolean);
            return parts[0] === 'track' ? parts[1] : '';
        }

        function renderCampaign(campaign) {
            const updates = campaign.customer_updates || [];
            const updateMarkup = updates.length ? updates.map(update => `
                <div class="update-item">
                    <strong>${escapeHtml(new Date(update.created_at).toLocaleString())}</strong>
                    <p style="color: var(--text-secondary); margin-top: 0.5rem;">${escapeHtml(update.message)}</p>
                </div>
            `).join('') : `
                <div class="update-item">
                    <p style="color: var(--text-secondary);">No customer-facing campaign updates have been posted yet.</p>
                </div>
            `;

            const badge = campaign.plan_badge || 'PROMOTION PLAN';
            const duration = campaign.campaign_duration || `${campaign.promotion_duration_days || 4} days`;
            const features = campaign.plan_features || [];
            const featuresMarkup = features.length ? `
                <div style="margin-top: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 16px;">
                    <h3 style="font-size: 1rem; margin-bottom: 0.75rem; color: var(--primary-glow);">Included Features</h3>
                    <ul style="list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 0.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                        ${features.map(f => `<li><i class="fas fa-check" style="color: #22c55e; margin-right: 8px;"></i>${escapeHtml(f)}</li>`).join('')}
                    </ul>
                </div>
            ` : '';

            document.getElementById('trackingCard').innerHTML = `
                <div style="display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: center;">
                    <div>
                        <div style="display: inline-block; font-size: 0.72rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border: 1px solid var(--glass-border); padding: 0.25rem 0.6rem; border-radius: 999px; margin-bottom: 0.5rem;">${escapeHtml(badge)}</div>
                        <h1>Campaign Tracking</h1>
                        <p style="color: var(--text-secondary);">${escapeHtml(campaign.plan_description || 'Track review, setup, curation, and completion updates.')}</p>
                    </div>
                    <span class="status-badge"><i class="fas fa-circle"></i>${escapeHtml(statusLabel(campaign.status))}</span>
                </div>

                <div class="tracking-grid" style="margin-top: 2rem;">
                    <img class="tracking-thumb" src="${escapeHtml(campaign.thumbnail)}" alt="">
                    <div>
                        <h2>${escapeHtml(campaign.video_title || 'Submitted YouTube Video')}</h2>
                        <div class="tracking-meta">
                            <div><span>Plan</span>${escapeHtml(campaign.plan)}</div>
                            <div><span>Amount Paid</span>NGN ${Number(campaign.amount_paid || 0).toLocaleString()}</div>
                            <div><span>Duration</span>${escapeHtml(duration)}</div>
                            <div><span>Curation Access</span>${escapeHtml(campaign.curation_access_type || 'Curation Listing')}</div>
                        </div>
                        <a href="${escapeHtml(campaign.video_url)}" target="_blank" class="btn" style="border: 1px solid var(--glass-border); color: white;">Open YouTube Video</a>
                    </div>
                </div>

                ${featuresMarkup}

                <h2 style="margin-top: 2.5rem;">Campaign Updates</h2>
                <div class="update-list">${updateMarkup}</div>

                <p style="color: var(--text-secondary); margin-top: 2rem; font-size: 0.9rem;">
                    Our campaigns are designed to help creators reach relevant viewers, built to increase exposure and discovery, and promote content to targeted audiences rather than promising specific counts of subscribers, watch hours, monetization approval, or revenue.
                </p>
            `;
        }

        async function loadTracking() {
            const code = getTrackingCode();
            if (!code) {
                document.getElementById('trackingCard').innerHTML = '<h1>Tracking code missing</h1><p style="color: var(--text-secondary);">Use the tracking link sent after payment.</p>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/campaigns/track/${encodeURIComponent(code)}`);
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.message || 'Campaign not found.');
                renderCampaign(data.campaign);
            } catch (err) {
                document.getElementById('trackingCard').innerHTML = `<h1>Campaign not found</h1><p style="color: var(--text-secondary);">${escapeHtml(err.message)}</p>`;
            }
        }

        loadTracking();
    </script>
    <footer style="text-align:center; color:rgba(255,255,255,0.3); font-size:0.82rem; padding:2rem 1rem;">CreatorLift By The Accountant</footer>
</body>
</html>
